```yaml
name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kanal-kart

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Log in to Docker Hub
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build and push Docker image
      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          echo "Building image $IMAGE_NAME:$IMAGE_TAG"
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 4️⃣ Configure kubeconfig (base64 safe method)
      - name: Configure Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > $HOME/kubeconfig.yaml
          export KUBECONFIG=$HOME/kubeconfig.yaml
          
          echo "===== DEBUG: kubeconfig preview ====="
          head -n 5 $HOME/kubeconfig.yaml
          echo "====================================="

          kubectl get nodes

      # 5️⃣ Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=$HOME/kubeconfig.yaml

          kubectl set image deployment/kanal-kart-deployment \
            kanal-kart=$IMAGE_NAME:$IMAGE_TAG

          kubectl rollout status deployment/kanal-kart-deployment
```
